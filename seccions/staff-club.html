<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestió Staff Club | CF Cardona</title>
    <script src="../assets/js/top-nav.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#d91d1d;--bg:#f1f5f9;--border:#e2e8f0;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
        body{background:var(--bg);min-height:100vh;padding:2rem;overflow-x:auto;}
        .card{background:#fff;border-radius:1rem;padding:2rem;box-shadow:0 4px 6px -1px rgb(0 0 0/0.1);border:1px solid var(--border);max-width:960px;margin:0 auto 2rem;position:relative;z-index:1;}
        .card h2{color:var(--primary);font-size:1.1rem;font-weight:800;margin-bottom:1.5rem;border-bottom:2px solid #fee2e2;padding-bottom:0.75rem;}
        .table-wrap{border:1px solid var(--border);border-radius:0.8rem;overflow:auto;background:#fff;}
        .players-table{width:100%;border-collapse:collapse;min-width:760px;}
        .players-table th,.players-table td{border-bottom:1px solid #e2e8f0;text-align:left;padding:0.72rem 0.75rem;vertical-align:middle;font-size:0.82rem;white-space:normal;}
        .players-table th{background:#fee2e2;color:var(--primary);font-weight:700;font-size:0.78rem;}
        .players-table tr:last-child td{border-bottom:0;}
        .players-table tbody tr:hover{background:#fff5f5;}
        .players-table tbody tr.group-row:hover{background:transparent;}
        .players-table .group-title{background:#f8fafc;color:#334155;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;font-size:0.76rem;padding:0.58rem 0.75rem;}
        .players-table tr.group-row.group-gap td{border-top:14px solid #f8fafc;}
        .add-form-box{margin-top:1rem;background:#f8fafc;border:1px solid var(--border);border-radius:0.75rem;padding:1rem;}
        .add-form-title{font-size:0.82rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;color:#475569;margin-bottom:0.8rem;}
        .form-grid{display:grid;grid-template-columns:2fr 1.2fr 1.2fr 1.2fr 0.8fr 0.8fr;gap:0.75rem;align-items:end;}
        .member-filter-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:0.75rem;align-items:end;}
        label{display:block;font-weight:700;font-size:0.8rem;color:#475569;margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.05em;}
        input[type=text],select{width:100%;padding:0.6rem 0.75rem;border:1px solid var(--border);border-radius:0.5rem;font-size:0.9rem;outline:none;background:#fff;}
        input[type=text]:focus,select:focus{border-color:var(--primary);}
        .checkbox-wrap{display:flex;gap:0.45rem;align-items:center;height:2.3rem;padding:0 0.1rem;}
        .checkbox-wrap input{width:1.05rem;height:1.05rem;}
        .actions-end{margin-top:0.9rem;display:flex;justify-content:flex-end;gap:0.6rem;}
        .btn{border:none;border-radius:0.5rem;padding:0.58rem 0.92rem;font-weight:700;font-size:0.82rem;cursor:pointer;}
        .btn-primary{background:var(--primary);color:#fff;}
        .btn-primary:hover{background:#b91c1c;}
        .btn-secondary{background:#e2e8f0;color:#0f172a;}
        .btn-secondary:hover{background:#cbd5e1;}
        .btn-tertiary{background:#fff1f2;color:#991b1b;border:1px solid #fecdd3;}
        .btn-tertiary:hover{background:#ffe4e6;}
        .delete-x{border:none;background:none;color:var(--primary);cursor:pointer;font-size:1rem;font-weight:800;line-height:1;padding:0;}
        .delete-x:hover{color:#991b1b;}
        .name-cell{font-weight:700;}
        .name-link{
            color:#b91c1c;
            text-decoration:none;
            font-weight:800;
            cursor:pointer;
            border:none;
            background:none;
            font-size:0.82rem;
            padding:0.2rem 0.35rem;
            border-radius:0.45rem;
            transition:background 0.15s,color 0.15s;
            text-align:left;
            white-space:normal;
            display:inline-block;
        }
        .name-link:hover{color:#991b1b;background:#fff1f2;}
        .empty-msg{color:#64748b;font-size:0.85rem;padding:1rem;text-align:center;}
        .assignment-list{margin-top:0.65rem;display:grid;gap:0.45rem;}
        .assignment-item{display:flex;justify-content:space-between;align-items:center;gap:0.65rem;padding:0.5rem 0.65rem;background:#fff;border:1px solid #e2e8f0;border-radius:0.55rem;}
        .assignment-label{font-size:0.8rem;color:#334155;font-weight:700;}
        .assignment-add{margin-top:0.7rem;display:flex;justify-content:flex-end;}
        .pill{display:inline-flex;align-items:center;border-radius:999px;padding:0.2rem 0.55rem;font-size:0.72rem;font-weight:800;}
        .pill-yes{background:#dcfce7;color:#166534;}
        .pill-no{background:#fee2e2;color:#b91c1c;}

        @media (max-width: 760px){
            body{padding:1rem;}
            .card{padding:1rem;}
            .form-grid,.member-filter-grid{grid-template-columns:1fr;}
            .actions-end{justify-content:stretch;}
            .actions-end .btn{width:100%;}

            .table-wrap{overflow:visible;}
            .players-table{min-width:0;}
            .players-table thead{display:none;}
            .players-table .group-title{font-size:0.72rem;padding:0.52rem 0.65rem;}

            .players-table tbody tr{
                display:grid;
                gap:0.15rem;
                border:1px solid #e2e8f0;
                border-radius:0.65rem;
                padding:0.45rem 0.55rem;
                margin:0.5rem;
            }
            .players-table tbody tr td{
                border-bottom:none;
                display:flex;
                align-items:flex-start;
                justify-content:space-between;
                gap:0.75rem;
                padding:0.3rem 0;
                font-size:0.82rem;
            }
            .players-table tbody tr td::before{
                content:attr(data-label);
                font-size:0.68rem;
                font-weight:800;
                color:#64748b;
                text-transform:uppercase;
                letter-spacing:0.04em;
                flex:0 0 auto;
            }
            .players-table tbody tr td:last-child{justify-content:flex-end;}
            .players-table tbody tr td:last-child::before{margin-right:auto;}
            .name-cell .name-link{padding:0;font-size:0.9rem;}

            .players-table tbody tr.group-row{
                display:table-row;
                border:none;
                border-radius:0;
                padding:0;
                margin:0;
            }
            .players-table tbody tr.group-row td{
                display:table-cell;
                padding:0;
            }
            .players-table tbody tr.group-row td::before{content:none;}
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>👥 Membres del staff del club</h2>
        <div class="add-form-box" style="margin-top:0;margin-bottom:1rem;">
            <div class="add-form-title">Buscador membres staff</div>
            <div class="member-filter-grid">
                <div>
                    <label>Nom</label>
                    <input type="text" id="f_nom" placeholder="Cercar per nom...">
                </div>
                <div>
                    <label>Equip</label>
                    <select id="f_equip"></select>
                </div>
                <div>
                    <label>Vista</label>
                    <select id="f_view">
                        <option value="grouped">Agrupat per equip</option>
                        <option value="summary">Resum per membre</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="table-wrap">
            <table class="players-table">
                <thead>
                    <tr>
                        <th>Nom i cognoms</th>
                        <th>Telèfon</th>
                        <th id="members_assignment_header">Rol</th>
                        <th style="text-align:center;">Carnet</th>
                        <th style="text-align:center;">Actiu</th>
                        <th style="width:60px;">Acció</th>
                    </tr>
                </thead>
                <tbody id="members_tbody"></tbody>
            </table>
        </div>

        <div class="add-form-box" id="member_form_box">
            <div class="add-form-title" id="member_form_title">Alta membre staff</div>
            <div class="form-grid">
                <div>
                    <label>Nom i cognoms</label>
                    <input type="text" id="m_nom" placeholder="Nom del membre...">
                </div>
                <div>
                    <label>Telèfon</label>
                    <input type="text" id="m_telefon" placeholder="Telèfon...">
                </div>
                <div id="member_equip_field">
                    <label>Equip</label>
                    <select id="m_equip"></select>
                </div>
                <div id="member_rol_field">
                    <label>Rol</label>
                    <select id="m_rol"></select>
                </div>
                <div>
                    <label>Carnet</label>
                    <div class="checkbox-wrap"><input type="checkbox" id="m_carnet"></div>
                </div>
                <div>
                    <label>Actiu</label>
                    <div class="checkbox-wrap"><input type="checkbox" id="m_actiu" checked></div>
                </div>
            </div>
            <div class="assignment-add">
                <button class="btn btn-tertiary" type="button" onclick="addDraftAssignment()">Afegir assignació</button>
            </div>
            <div id="member_assignments_list" class="assignment-list"></div>
            <div class="actions-end">
                <button class="btn btn-secondary" id="btn_cancel_member" onclick="cancelEditMember()">Cancel·lar</button>
                <button class="btn btn-primary" id="btn_save_member" onclick="saveMember()">Desar membre</button>
            </div>
        </div>
    </div>

    <script>
        const API_MEMBERS = '/api/staff-club/members';
        const API_ASSIGNMENTS = '/api/staff-club/assignments';
        const API_EQUIPS = '/api/equips';
        const API_ROLS = '/api/rols';

        let members = [];
        let assignments = [];
        let equips = [];
        let rols = [];
        let editingMemberId = null;
        let draftAssignments = [];

        function esc(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        async function requestJson(url, options) {
            const res = await fetch(url, options);
            if (!res.ok) {
                const msg = await res.text();
                throw new Error(msg || `HTTP ${res.status}`);
            }
            const text = await res.text();
            return text ? JSON.parse(text) : null;
        }

        function getEquipNameById(id) {
            const match = equips.find(e => String(e.id) === String(id));
            return match ? (match.name || match.nom || `Equip ${id}`) : `Equip ${id}`;
        }

        function getMemberById(id) {
            return members.find(m => String(m.id) === String(id)) || null;
        }

        function compareRoleIds(a, b) {
            const rawA = String(a || '').trim();
            const rawB = String(b || '').trim();
            const numA = Number(rawA);
            const numB = Number(rawB);
            const isNumA = Number.isInteger(numA);
            const isNumB = Number.isInteger(numB);

            if (isNumA && isNumB) return numA - numB;
            if (isNumA) return -1;
            if (isNumB) return 1;

            return rawA.localeCompare(rawB, undefined, { numeric: true, sensitivity: 'base' });
        }

        function getRolNameById(id) {
            const roleId = String(id || '').trim();
            if (!roleId) return '-';

            const match = rols.find(r => String(r && r.id || '').trim() === roleId);
            return match ? String(match.nom || match.name || `Rol ${roleId}`) : `Rol ${roleId}`;
        }

        function formatRoleList(roleIds) {
            const ids = (Array.isArray(roleIds) ? roleIds : [])
                .map(id => String(id || '').trim())
                .filter(Boolean)
                .sort(compareRoleIds);

            if (!ids.length) return '-';
            return ids.map(getRolNameById).join(', ');
        }

        function compareEquipsById(a, b) {
            const rawA = String((a && a.id) || '').trim();
            const rawB = String((b && b.id) || '').trim();
            const numA = Number(rawA);
            const numB = Number(rawB);
            const isNumA = Number.isInteger(numA);
            const isNumB = Number.isInteger(numB);

            if (isNumA && isNumB) return numA - numB;
            if (isNumA) return -1;
            if (isNumB) return 1;

            return rawA.localeCompare(rawB, undefined, { numeric: true, sensitivity: 'base' });
        }

        function normalizeText(value) {
            return String(value || '')
                .trim()
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');
        }

        function renderMemberEquipOptions(selectedEquipId = '') {
            const equipSelect = document.getElementById('m_equip');
            if (!equipSelect) return;

            const currentValue = String(selectedEquipId || '').trim();
            const sortedEquips = [...equips].sort(compareEquipsById);
            equipSelect.innerHTML = `
                <option value="">Sense assignar</option>
                ${sortedEquips.map(e => `<option value="${esc(e.id)}">${esc(e.name || e.nom || e.id)}</option>`).join('')}
            `;

            const hasCurrent = Array.from(equipSelect.options).some(option => option.value === currentValue);
            equipSelect.value = hasCurrent ? currentValue : '';
        }

        function renderMemberRoleOptions(selectedRoleId = '') {
            const roleSelect = document.getElementById('m_rol');
            if (!roleSelect) return;

            const currentValue = String(selectedRoleId || '').trim();
            const sortedRoles = [...rols].sort((a, b) => compareRoleIds((a && a.id) || '', (b && b.id) || ''));

            roleSelect.innerHTML = `
                <option value="">Sense rol</option>
                ${sortedRoles.map(role => `<option value="${esc(role.id)}">${esc(role.nom || role.name || role.id)}</option>`).join('')}
            `;

            const hasCurrent = Array.from(roleSelect.options).some(option => option.value === currentValue);
            roleSelect.value = hasCurrent ? currentValue : '';
        }

        function normalizeAssignmentPair(pair) {
            const equipId = String(pair && (pair.equip_id ?? pair.equipId) || '').trim();
            const rolId = String(pair && (pair.rol_id ?? pair.rolId) || '').trim();

            if (!/^\d+$/.test(equipId) || !/^\d+$/.test(rolId)) return null;

            return {
                equip_id: equipId,
                rol_id: rolId
            };
        }

        function getAssignmentKey(assignment) {
            const normalized = normalizeAssignmentPair(assignment);
            if (!normalized) return '';
            return `${normalized.equip_id}:${normalized.rol_id}`;
        }

        function sortAssignmentsList(list) {
            return [...(Array.isArray(list) ? list : [])].sort((a, b) => {
                const equipCompare = compareRoleIds(a.equip_id, b.equip_id);
                if (equipCompare !== 0) return equipCompare;
                return compareRoleIds(a.rol_id, b.rol_id);
            });
        }

        function setDraftAssignments(nextAssignments) {
            const seen = new Set();
            const normalized = [];

            (Array.isArray(nextAssignments) ? nextAssignments : []).forEach(item => {
                const parsed = normalizeAssignmentPair(item);
                if (!parsed) return;

                const key = getAssignmentKey(parsed);
                if (!key || seen.has(key)) return;

                seen.add(key);
                normalized.push(parsed);
            });

            draftAssignments = sortAssignmentsList(normalized);
            renderDraftAssignments();
        }

        function getAssignmentsForMember(memberId) {
            const normalizedMemberId = String(memberId || '').trim();
            if (!normalizedMemberId) return [];

            const memberAssignments = assignments
                .filter(row => String(row && row.staff_membre_id || '').trim() === normalizedMemberId)
                .map(normalizeAssignmentPair)
                .filter(Boolean);

            const seen = new Set();
            const deduped = [];
            memberAssignments.forEach(item => {
                const key = getAssignmentKey(item);
                if (!key || seen.has(key)) return;
                seen.add(key);
                deduped.push(item);
            });

            return sortAssignmentsList(deduped);
        }

        function renderDraftAssignments() {
            const container = document.getElementById('member_assignments_list');
            if (!container) return;

            if (!draftAssignments.length) {
                container.innerHTML = '<div class="empty-msg">Sense assignacions equip/rol.</div>';
                return;
            }

            container.innerHTML = draftAssignments.map((assignment, index) => {
                const equipName = getEquipNameById(assignment.equip_id);
                const rolName = getRolNameById(assignment.rol_id);

                return `
                    <div class="assignment-item">
                        <span class="assignment-label">${esc(equipName)} · ${esc(rolName)}</span>
                        <button type="button" class="delete-x" title="Treure assignació" onclick="removeDraftAssignment(${index})">✕</button>
                    </div>
                `;
            }).join('');
        }

        async function syncMemberAssignments(memberId, desiredAssignments) {
            const memberIdText = String(memberId || '').trim();
            if (!memberIdText) return;

            const desired = sortAssignmentsList((Array.isArray(desiredAssignments) ? desiredAssignments : [])
                .map(normalizeAssignmentPair)
                .filter(Boolean));
            const current = getAssignmentsForMember(memberIdText);

            const desiredKeys = new Set(desired.map(getAssignmentKey));
            const currentKeys = new Set(current.map(getAssignmentKey));

            for (const assignment of current) {
                const key = getAssignmentKey(assignment);
                if (!key || desiredKeys.has(key)) continue;

                await requestJson(
                    `${API_ASSIGNMENTS}?equipId=${encodeURIComponent(assignment.equip_id)}&rolId=${encodeURIComponent(assignment.rol_id)}`,
                    { method: 'DELETE' }
                );
            }

            for (const assignment of desired) {
                const key = getAssignmentKey(assignment);
                if (!key || currentKeys.has(key)) continue;

                await requestJson(API_ASSIGNMENTS, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        equip_id: assignment.equip_id,
                        rol_id: assignment.rol_id,
                        staff_membre_id: memberIdText
                    })
                });
            }
        }

        function buildMemberTeamMap() {
            const map = new Map();
            assignments.forEach(assignment => {
                const memberId = String(assignment && assignment.staff_membre_id ? assignment.staff_membre_id : '').trim();
                const equipId = String(assignment && assignment.equip_id ? assignment.equip_id : '').trim();
                const rolId = String(assignment && assignment.rol_id ? assignment.rol_id : '').trim();
                if (!memberId || !equipId || !rolId) return;

                if (!map.has(memberId)) {
                    map.set(memberId, new Map());
                }

                const teamMap = map.get(memberId);
                if (!teamMap.has(equipId)) {
                    teamMap.set(equipId, new Set());
                }
                teamMap.get(equipId).add(rolId);
            });
            return map;
        }

        function getMemberRolesForEquip(memberTeamMap, memberId, equipId) {
            const memberKey = String(memberId || '').trim();
            const teamKey = String(equipId || '').trim();
            const teamMap = memberTeamMap.get(memberKey);
            if (!teamMap || !teamMap.has(teamKey)) return [];

            return Array.from(teamMap.get(teamKey)).sort(compareRoleIds);
        }

        function getMemberRowMarkup(member, roleData = [], equipId = '') {
            const carnetBadge = member.carnet
                ? '<span class="pill pill-yes">Sí</span>'
                : '<span class="pill pill-no">No</span>';
            const activeBadge = member.actiu
                ? '<span class="pill pill-yes">Actiu</span>'
                : '<span class="pill pill-no">Inactiu</span>';
            const roleLabel = Array.isArray(roleData)
                ? formatRoleList(roleData)
                : String(roleData || '-').trim() || '-';
            const roleIdsAttr = (Array.isArray(roleData) ? roleData : []).join(',');

            return `
                <tr>
                    <td data-label="Nom i cognoms" class="name-cell"><button type="button" class="name-link" data-action="edit" data-member-id="${esc(member.id)}" data-equip-id="${esc(equipId)}" data-role-ids="${esc(roleIdsAttr)}">${esc(member.nom)}</button></td>
                    <td data-label="Telèfon">${esc(member.telefon || '-')}</td>
                    <td data-label="Rol">${esc(roleLabel)}</td>
                    <td data-label="Carnet" style="text-align:center;">${carnetBadge}</td>
                    <td data-label="Actiu" style="text-align:center;">${activeBadge}</td>
                    <td data-label="Acció" style="text-align:right;"><button type="button" class="delete-x" title="Eliminar" data-action="delete" data-member-id="${esc(member.id)}">✕</button></td>
                </tr>
            `;
        }

        function getMemberAssignmentPairs(memberTeamMap, memberId, teamFilter = '') {
            const memberKey = String(memberId || '').trim();
            const teamMap = memberTeamMap.get(memberKey) || new Map();
            const pairs = [];

            if (teamFilter && teamFilter !== '__UNASSIGNED__') {
                const roleSet = teamMap.get(String(teamFilter || ''));
                if (!roleSet) return [];

                Array.from(roleSet).forEach(rolId => {
                    const parsed = normalizeAssignmentPair({ equip_id: teamFilter, rol_id: rolId });
                    if (parsed) pairs.push(parsed);
                });

                return sortAssignmentsList(pairs);
            }

            teamMap.forEach((roleSet, equipId) => {
                Array.from(roleSet || []).forEach(rolId => {
                    const parsed = normalizeAssignmentPair({ equip_id: equipId, rol_id: rolId });
                    if (parsed) pairs.push(parsed);
                });
            });

            return sortAssignmentsList(pairs);
        }

        function formatMemberAssignmentsLabel(assignmentPairs, teamFilter = '') {
            const pairs = Array.isArray(assignmentPairs) ? assignmentPairs : [];
            if (!pairs.length) return 'Sense assignar';

            if (teamFilter && teamFilter !== '__UNASSIGNED__') {
                return pairs
                    .map(pair => getRolNameById(pair.rol_id))
                    .join(', ');
            }

            return pairs
                .map(pair => `${getEquipNameById(pair.equip_id)} · ${getRolNameById(pair.rol_id)}`)
                .join(' | ');
        }

        function renderMembersSummary(tbody, filteredMembers, memberTeamMap, teamFilter) {
            const rows = [...filteredMembers]
                .sort((a, b) => String(a.nom || '').localeCompare(String(b.nom || '')))
                .map(member => {
                    const assignmentPairs = getMemberAssignmentPairs(memberTeamMap, member.id, teamFilter);
                    const assignmentLabel = formatMemberAssignmentsLabel(assignmentPairs, teamFilter);
                    return getMemberRowMarkup(member, assignmentLabel, '');
                })
                .join('');

            tbody.innerHTML = rows || '<tr><td colspan="6" class="empty-msg">Cap membre coincideix amb els filtres seleccionats.</td></tr>';
        }

        function renderMemberFilters() {
            const equipFilter = document.getElementById('f_equip');
            if (!equipFilter) return;

            const currentValue = String(equipFilter.value || '');
            const sortedEquips = [...equips].sort(compareEquipsById);

            equipFilter.innerHTML = `
                <option value="">Tots els equips</option>
                <option value="__UNASSIGNED__">SENSE ASSIGNAR</option>
                ${sortedEquips.map(e => `<option value="${esc(e.id)}">${esc(e.name || e.nom || e.id)}</option>`).join('')}
            `;

            const hasCurrent = Array.from(equipFilter.options).some(option => option.value === currentValue);
            equipFilter.value = hasCurrent ? currentValue : '';
        }

        function resetMemberForm() {
            editingMemberId = null;
            document.getElementById('member_form_title').textContent = 'Alta membre staff';
            document.getElementById('m_nom').value = '';
            document.getElementById('m_telefon').value = '';
            document.getElementById('m_carnet').checked = false;
            document.getElementById('m_actiu').checked = true;
            const equipField = document.getElementById('member_equip_field');
            const roleField = document.getElementById('member_rol_field');
            const equipSelect = document.getElementById('m_equip');
            const roleSelect = document.getElementById('m_rol');
            if (equipField) equipField.style.display = '';
            if (roleField) roleField.style.display = '';
            if (equipSelect) {
                renderMemberEquipOptions('');
                equipSelect.disabled = false;
            }
            if (roleSelect) {
                renderMemberRoleOptions('');
                roleSelect.disabled = false;
            }
            setDraftAssignments([]);
            document.getElementById('btn_cancel_member').style.display = 'none';
            document.getElementById('btn_save_member').textContent = 'Desar membre';
        }

        function renderMembers() {
            const tbody = document.getElementById('members_tbody');
            if (!members.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">No hi ha membres de staff registrats.</td></tr>';
                return;
            }

            const nameFilter = normalizeText(document.getElementById('f_nom') ? document.getElementById('f_nom').value : '');
            const teamFilter = String(document.getElementById('f_equip') ? document.getElementById('f_equip').value : '');
            const viewMode = String(document.getElementById('f_view') ? document.getElementById('f_view').value : 'grouped');
            const assignmentHeader = document.getElementById('members_assignment_header');
            const memberTeamMap = buildMemberTeamMap();

            if (assignmentHeader) {
                assignmentHeader.textContent = viewMode === 'summary' ? 'Assignacions' : 'Rol';
            }

            const filteredMembers = members.filter(member => {
                const normalizedName = normalizeText(member.nom);
                if (nameFilter && !normalizedName.includes(nameFilter)) return false;

                if (!teamFilter) return true;

                const teamMap = memberTeamMap.get(String(member.id)) || new Map();
                if (teamFilter === '__UNASSIGNED__') {
                    return teamMap.size === 0;
                }

                return teamMap.has(teamFilter);
            });

            if (!filteredMembers.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">Cap membre coincideix amb els filtres seleccionats.</td></tr>';
                return;
            }

            if (viewMode === 'summary') {
                renderMembersSummary(tbody, filteredMembers, memberTeamMap, teamFilter);
                return;
            }

            const groups = [];

            if (!teamFilter || teamFilter === '__UNASSIGNED__') {
                const unassigned = filteredMembers.filter(member => {
                    const teamMap = memberTeamMap.get(String(member.id)) || new Map();
                    return teamMap.size === 0;
                });

                if (unassigned.length) {
                    groups.push({
                        title: 'SENSE ASSIGNAR',
                        members: unassigned.map(member => ({ member, roleIds: [], equipId: '' }))
                    });
                }
            }

            if (teamFilter && teamFilter !== '__UNASSIGNED__') {
                const teamMembers = filteredMembers
                    .map(member => {
                        const roleIds = getMemberRolesForEquip(memberTeamMap, member.id, teamFilter);
                        if (!roleIds.length) return null;
                        return { member, roleIds, equipId: String(teamFilter || '') };
                    })
                    .filter(Boolean)
                    .sort((a, b) => {
                        const roleCompare = compareRoleIds(a.roleIds[0], b.roleIds[0]);
                        if (roleCompare !== 0) return roleCompare;
                        return String(a.member.nom || '').localeCompare(String(b.member.nom || ''));
                    });

                if (teamMembers.length) {
                    groups.push({
                        title: getEquipNameById(teamFilter),
                        members: teamMembers
                    });
                }
            } else if (!teamFilter) {
                const sortedEquips = [...equips].sort(compareEquipsById);

                sortedEquips.forEach(equip => {
                    const equipId = String(equip.id || '');
                    const teamMembers = filteredMembers
                        .map(member => {
                            const roleIds = getMemberRolesForEquip(memberTeamMap, member.id, equipId);
                            if (!roleIds.length) return null;
                            return { member, roleIds, equipId };
                        })
                        .filter(Boolean)
                        .sort((a, b) => {
                            const roleCompare = compareRoleIds(a.roleIds[0], b.roleIds[0]);
                            if (roleCompare !== 0) return roleCompare;
                            return String(a.member.nom || '').localeCompare(String(b.member.nom || ''));
                        });

                    if (teamMembers.length) {
                        groups.push({
                            title: String(equip.name || equip.nom || `Equip ${equipId}`),
                            members: teamMembers
                        });
                    }
                });
            }

            if (!groups.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">Cap membre coincideix amb els filtres seleccionats.</td></tr>';
                return;
            }

            tbody.innerHTML = groups.map((group, index) => `
                <tr class="group-row ${index > 0 ? 'group-gap' : ''}">
                    <td colspan="6" class="group-title">${esc(group.title)} (${group.members.length})</td>
                </tr>
                ${group.members.map(item => getMemberRowMarkup(item.member, item.roleIds, item.equipId)).join('')}
            `).join('');
        }

        window.editMember = function(memberId) {
            const member = getMemberById(memberId);
            if (!member) return;

            editingMemberId = String(member.id);
            document.getElementById('member_form_title').textContent = 'Modificar membre staff';
            document.getElementById('m_nom').value = member.nom || '';
            document.getElementById('m_telefon').value = member.telefon || '';
            document.getElementById('m_carnet').checked = !!member.carnet;
            document.getElementById('m_actiu').checked = member.actiu !== false;

            const equipField = document.getElementById('member_equip_field');
            const roleField = document.getElementById('member_rol_field');
            const equipSelect = document.getElementById('m_equip');
            const roleSelect = document.getElementById('m_rol');
            if (equipField) equipField.style.display = '';
            if (roleField) roleField.style.display = '';
            renderMemberEquipOptions('');
            renderMemberRoleOptions('');
            if (equipSelect) {
                equipSelect.disabled = false;
            }
            if (roleSelect) {
                roleSelect.disabled = false;
            }

            setDraftAssignments(getAssignmentsForMember(editingMemberId));

            document.getElementById('btn_cancel_member').style.display = '';
            document.getElementById('btn_save_member').textContent = 'Actualitzar membre';
            const formBox = document.getElementById('member_form_box');
            if (formBox && typeof formBox.scrollIntoView === 'function') {
                formBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        window.cancelEditMember = function() {
            resetMemberForm();
        };

        window.saveMember = async function() {
            const payload = {
                id: editingMemberId,
                nom: document.getElementById('m_nom').value.trim(),
                telefon: document.getElementById('m_telefon').value.trim(),
                carnet: document.getElementById('m_carnet').checked,
                actiu: document.getElementById('m_actiu').checked
            };
            const selectedEquipId = String((document.getElementById('m_equip') || {}).value || '').trim();
            const selectedRoleId = String((document.getElementById('m_rol') || {}).value || '').trim();

            if (!payload.nom) {
                alert('Introdueix el nom del membre de staff.');
                return;
            }

            if ((selectedEquipId && !selectedRoleId) || (!selectedEquipId && selectedRoleId)) {
                alert('Per afegir una assignació pendent cal seleccionar equip i rol.');
                return;
            }

            const pendingAssignment = normalizeAssignmentPair({
                equip_id: selectedEquipId,
                rol_id: selectedRoleId
            });
            const pendingKey = getAssignmentKey(pendingAssignment);
            const desiredAssignments = pendingKey && !draftAssignments.some(item => getAssignmentKey(item) === pendingKey)
                ? [...draftAssignments, pendingAssignment]
                : [...draftAssignments];

            try {
                if (editingMemberId) {
                    await requestJson(API_MEMBERS, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    await syncMemberAssignments(editingMemberId, desiredAssignments);
                } else {
                    const created = await requestJson(API_MEMBERS, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const createdMemberId = String(
                        (created && created.member && (created.member.id ?? created.member.staff_membre_id)) || ''
                    ).trim();

                    await syncMemberAssignments(createdMemberId, desiredAssignments);
                }

                await loadAll();
                resetMemberForm();
            } catch (error) {
                alert('No s\'ha pogut desar el membre de staff.');
                console.error(error);
            }
        };

        window.deleteMember = async function(memberId) {
            if (!confirm('Segur que vols eliminar aquest membre del staff?')) return;

            try {
                await requestJson(`${API_MEMBERS}?id=${encodeURIComponent(memberId)}`, {
                    method: 'DELETE'
                });
                await loadAll();
                if (String(editingMemberId) === String(memberId)) {
                    resetMemberForm();
                }
            } catch (error) {
                alert('No s\'ha pogut eliminar el membre de staff.');
                console.error(error);
            }
        };

        async function loadAll() {
            try {
                const [membersData, assignmentsData, equipsData, rolsData] = await Promise.all([
                    requestJson(API_MEMBERS),
                    requestJson(API_ASSIGNMENTS),
                    requestJson(API_EQUIPS),
                    requestJson(API_ROLS)
                ]);

                members = Array.isArray(membersData) ? membersData : [];
                assignments = Array.isArray(assignmentsData) ? assignmentsData : [];
                equips = Array.isArray(equipsData) ? equipsData : [];
                rols = Array.isArray(rolsData) ? rolsData : [];

                renderMemberFilters();
                renderMembers();
                if (!editingMemberId) {
                    renderMemberEquipOptions((document.getElementById('m_equip') || {}).value || '');
                    renderMemberRoleOptions((document.getElementById('m_rol') || {}).value || '');
                    renderDraftAssignments();
                }
            } catch (error) {
                console.error('Error carregant dades de staff club:', error);
                alert('No s\'han pogut carregar les dades de staff club.');
            }
        }

        window.addDraftAssignment = function() {
            const equipId = String((document.getElementById('m_equip') || {}).value || '').trim();
            const roleId = String((document.getElementById('m_rol') || {}).value || '').trim();

            if (!equipId || !roleId) {
                alert('Selecciona equip i rol per afegir una assignació.');
                return;
            }

            const nextAssignment = normalizeAssignmentPair({ equip_id: equipId, rol_id: roleId });
            const nextKey = getAssignmentKey(nextAssignment);
            const alreadyExists = draftAssignments.some(item => getAssignmentKey(item) === nextKey);
            if (alreadyExists) {
                alert('Aquesta assignació ja està afegida.');
                return;
            }

            setDraftAssignments([...draftAssignments, nextAssignment]);
        };

        window.removeDraftAssignment = function(index) {
            const idx = Number(index);
            if (!Number.isInteger(idx) || idx < 0 || idx >= draftAssignments.length) return;

            const nextAssignments = draftAssignments.filter((_, currentIndex) => currentIndex !== idx);
            setDraftAssignments(nextAssignments);
        };

        document.getElementById('members_tbody').addEventListener('click', function(event) {
            const button = event.target.closest('button[data-action][data-member-id]');
            if (!button) return;

            const action = String(button.dataset.action || '');
            const memberId = String(button.dataset.memberId || '');
            if (!action || !memberId) return;

            if (action === 'edit') {
                window.editMember(memberId);
                return;
            }

            if (action === 'delete') {
                window.deleteMember(memberId);
            }
        });

        document.getElementById('f_nom').addEventListener('input', renderMembers);
        document.getElementById('f_equip').addEventListener('change', renderMembers);
        document.getElementById('f_view').addEventListener('change', renderMembers);

        resetMemberForm();
        loadAll();
    </script>
</body>
</html>
