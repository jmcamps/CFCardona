<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infografia Horaris Setmanals | CF Cardona</title>
    <script src="../assets/js/top-nav.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#d91d1d;--bg:#f1f5f9;--border:#e2e8f0;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
        body{background:var(--bg);min-height:100vh;padding:2rem;}
        .wrap{max-width:960px;margin:0 auto;}

        .head{background:#fff;border:1px solid var(--border);border-radius:1rem;padding:1.2rem;box-shadow:0 8px 22px rgba(2,6,23,0.08);margin-bottom:1rem;}
        .head-top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;}
        .head h1{font-size:1.4rem;font-weight:900;color:#b91c1c;}
        .head p{margin-top:0.3rem;color:#64748b;font-size:0.9rem;}
        .actions{display:flex;gap:0.5rem;flex-wrap:wrap;}
        .btn{display:inline-flex;align-items:center;justify-content:center;padding:0.58rem 0.86rem;border-radius:0.55rem;border:1px solid var(--border);background:#fff;color:#0f172a;font-weight:800;font-size:0.79rem;text-decoration:none;cursor:pointer;}
        .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
        .btn:disabled{opacity:0.65;cursor:not-allowed;}
        .refresh-status{display:inline-flex;align-items:center;font-size:0.78rem;font-weight:800;color:#64748b;padding:0.1rem 0.2rem;min-width:96px;}
        .refresh-status.ok{color:#15803d;}
        .refresh-status.err{color:#b91c1c;}

        .day-tabs{display:flex;gap:0.45rem;flex-wrap:wrap;margin-top:1rem;}
        .day-tab{padding:0.5rem 0.8rem;border:1px solid #fecaca;border-radius:999px;background:#fff;font-size:0.8rem;font-weight:900;color:#7f1d1d;cursor:pointer;}
        .day-tab.active{background:var(--primary);border-color:var(--primary);color:#fff;}

        .content{background:#fff;border:1px solid var(--border);border-radius:1rem;padding:1rem;box-shadow:0 8px 22px rgba(2,6,23,0.08);}
        .day-title{font-size:1.1rem;font-weight:900;color:#b91c1c;margin-bottom:0.2rem;}
        .day-sub{font-size:0.8rem;color:#64748b;font-weight:700;margin-bottom:1rem;}

        .slot{border:1px solid var(--border);border-radius:0.85rem;padding:0.85rem;background:#fff;margin-bottom:0.9rem;}
        .slot-head{display:flex;justify-content:space-between;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.7rem;}
        .slot-time{font-size:0.9rem;font-weight:900;color:#0f172a;}
        .slot-tag{font-size:0.72rem;font-weight:800;color:#991b1b;background:#fff1f2;border:1px solid #fecaca;border-radius:999px;padding:0.2rem 0.55rem;}
        .slot-layout{display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:0.75rem;align-items:start;}
        .fields{display:grid;grid-template-columns:1fr;gap:0.75rem;}

        .vestidors-box{border:1px solid #fecaca;background:#fff5f5;border-radius:0.55rem;padding:0.65rem 0.7rem;}
        .vestidors-box h4{font-size:0.82rem;color:#991b1b;font-weight:900;margin-bottom:0.45rem;}
        .vestidors-list{list-style:none;padding:0;margin:0;display:grid;gap:0.25rem;}
        .vestidors-list li{font-size:0.78rem;color:#7f1d1d;font-weight:800;line-height:1.2;}
        .vestidors-empty{font-size:0.76rem;color:#9f1239;font-weight:700;}

        .field-card{
            border:1px solid #15803d;
            border-radius:0.65rem;
            overflow:hidden;
            background:#14532d;
            box-shadow:inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        .field{
            position:relative;
            width:100%;
            aspect-ratio:105 / 64;
            background:
                radial-gradient(ellipse at center, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.03) 58%, rgba(0,0,0,0.14) 100%),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.09) 0 34px, rgba(255,255,255,0.02) 34px 68px),
                linear-gradient(180deg, #2ea043 0%, #1f7a33 52%, #1a6b2f 100%);
        }
        .field .field-lines{
            position:absolute;
            inset:8px;
            width:calc(100% - 16px);
            height:calc(100% - 16px);
            pointer-events:none;
            z-index:1;
        }
        .field .field-lines .line{
            fill:none;
            stroke:rgba(255,255,255,0.94);
            stroke-width:0.75;
            stroke-linecap:round;
            stroke-linejoin:round;
            vector-effect:non-scaling-stroke;
        }
        .field .field-lines .spot{
            fill:rgba(255,255,255,0.95);
            stroke:none;
        }

        .zones{position:relative;display:grid;height:100%;}
        .zones.quad{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
        .zones.duo{grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
        .zone{display:flex;align-items:center;justify-content:center;padding:0.45rem;text-align:center;position:relative;z-index:2;}
        .half-center-stack{position:absolute;top:50%;transform:translate(-50%,-50%);z-index:3;display:flex;flex-direction:column;gap:0.28rem;align-items:center;max-width:42%;}
        .half-center-stack.left{left:25%;}
        .half-center-stack.right{left:75%;}
        .half-center-stack .team-pill{max-width:100%;}
        .goal-area-stack{position:absolute;top:50%;transform:translate(-50%,-50%);z-index:3;display:flex;flex-direction:column;gap:0.2rem;align-items:center;max-width:38%;}
        .goal-area-stack.left{left:12%;}
        .goal-area-stack.right{left:88%;}
        .goal-area-stack .goalkeeper-marker{margin-top:0;}
        .team-line{display:flex;align-items:center;justify-content:center;gap:0.55rem;max-width:98%;width:100%;}
        .team-pill{background:rgba(15,23,42,0.5);color:#f8fafc;border:1px solid rgba(255,255,255,0.34);border-radius:0.5rem;padding:0.2rem 0.55rem;font-size:0.92rem;font-weight:900;line-height:1.15;min-width:0;max-width:95%;text-shadow:0 1px 1px rgba(0,0,0,0.35);}
        .team-pill.empty{background:rgba(15,23,42,0.18);color:rgba(248,250,252,0.8);border-color:rgba(255,255,255,0.2);font-weight:800;font-size:0.8rem;}
        .goalkeeper-marker{margin-top:0.28rem;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;background:#fff7ed;color:#9a3412;border:1px solid #fdba74;border-radius:0.55rem;padding:0.18rem 0.45rem;font-size:0.68rem;font-weight:900;line-height:1.1;min-width:86px;}
        .goalkeeper-marker .goalkeeper-title{font-size:0.64rem;letter-spacing:0.03em;}
        .goalkeeper-marker .goalkeeper-time{font-size:0.68rem;font-weight:900;white-space:nowrap;}

        .pending-list{display:flex;flex-wrap:wrap;gap:0.45rem;}
        .pending-item{font-size:0.75rem;font-weight:800;color:#065f46;background:#ecfdf5;border:1px solid #86efac;border-radius:999px;padding:0.25rem 0.55rem;}

        .empty{padding:2rem 1rem;text-align:center;color:#94a3b8;font-weight:800;}

        @media(max-width:900px){
            body{padding:1rem;}
            .head{padding:1rem;}
            .head h1{font-size:1.2rem;}
            .actions{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:0.45rem;}
            .actions .btn,
            .actions .refresh-status{width:100%;justify-content:center;}
            .day-tabs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:0.4rem;}
            .day-tab{text-align:center;width:100%;}
            .slot-layout{grid-template-columns:1fr;}
            .fields{grid-template-columns:1fr;}
            .slot{padding:0.72rem;}
            .slot-time{font-size:0.85rem;}
            .team-pill{font-size:0.84rem;}
        }

        @media(max-width:640px){
            body{padding:0.7rem;}
            .actions{grid-template-columns:1fr;}
            .day-tabs{grid-template-columns:repeat(2,minmax(0,1fr));}
            .day-title{font-size:1rem;}
            .day-sub{font-size:0.75rem;}
            .slot-layout{gap:0.6rem;}
            .vestidors-box{padding:0.55rem 0.6rem;}
            .field .field-lines{inset:6px;width:calc(100% - 12px);height:calc(100% - 12px);}
            .team-pill{font-size:0.78rem;padding:0.16rem 0.4rem;}
            .goalkeeper-marker{min-width:102px;padding:0.2rem 0.5rem;}
            .goalkeeper-marker .goalkeeper-title{font-size:0.62rem;}
            .goalkeeper-marker .goalkeeper-time{font-size:0.66rem;}
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="head">
            <div class="head-top">
                <div>
                    <h1>Infografia setmanal d'entrenaments</h1>
                    <p>Per franges: camp en 4 zones (Espais 1-4) o en 2 zones (F11), amb l'equip sobre cada secció i els entrenaments de porters a la porteria assignada.</p>
                </div>
                <div class="actions">
                    <a class="btn" id="manageHorarisBtn" href="horari-entrenaments.html">Gestionar horaris</a>
                    <button class="btn primary" id="refreshBtn" type="button">Actualitzar dades</button>
                    <span id="refreshStatus" class="refresh-status"></span>
                </div>
            </div>
            <div id="dayTabs" class="day-tabs"></div>
        </section>

        <section class="content">
            <div id="dayBig" class="day-title">Dilluns</div>
            <div id="daySub" class="day-sub">Franges planificades del dia</div>
            <div id="board"></div>
        </section>
    </div>

    <script>
        const API_HORARIOS = '/api/horarios';
        const API_EQUIPS = '/api/equips';
        const DIES = ['Dilluns','Dimarts','Dimecres','Dijous','Divendres'];
        const CAMP_STD = ['Espai 1','Espai 2','Espai 3','Espai 4'];
        const CAMP_F11 = ['Espai 1/2 (F11)','Espai 3/4 (F11)'];

        let teams = [];
        let horarios = [];
        let activeDay = DIES[0];

        function normalizeRole(value) {
            const raw = String(value || '').trim().toLowerCase();
            if (!raw) return '';

            const compact = raw
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[\s-]+/g, '_');

            if (compact === 'administrator' || compact === 'superadmin') return 'admin';
            if (compact === 'management' || compact === 'direccion') return 'direccio';
            if (compact === 'base') return 'futbol_base';
            if (compact === 'read' || compact === 'readonly' || compact === 'lectura') return 'viewer';
            return compact;
        }

        function normalizeRoleList(rawRoles) {
            if (Array.isArray(rawRoles)) {
                return [...new Set(rawRoles.map(normalizeRole).filter(Boolean))];
            }

            if (typeof rawRoles === 'string') {
                return [...new Set(rawRoles.split(',').map(function (part) {
                    return normalizeRole(part);
                }).filter(Boolean))];
            }

            if (rawRoles && typeof rawRoles === 'object' && Array.isArray(rawRoles.roles)) {
                return [...new Set(rawRoles.roles.map(normalizeRole).filter(Boolean))];
            }

            return [];
        }

        function canManageHoraris(rawRoles) {
            const roles = normalizeRoleList(rawRoles);
            if (!roles.length) return false;
            return roles.includes('admin') || roles.includes('direccio') || roles.includes('senior') || roles.includes('futbol_base');
        }

        async function applyActionsVisibilityByRole() {
            const manageBtn = document.getElementById('manageHorarisBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const refreshStatus = document.getElementById('refreshStatus');

            try {
                const res = await fetch('/api/auth/session', { credentials: 'same-origin' });
                if (!res.ok) return;

                const data = await res.json();
                const roles = data && data.user ? data.user.roles : [];
                const canManage = canManageHoraris(roles);

                if (!canManage) {
                    if (manageBtn) manageBtn.style.display = 'none';
                    if (refreshBtn) refreshBtn.style.display = 'none';
                    if (refreshStatus) {
                        refreshStatus.style.display = 'none';
                        refreshStatus.textContent = '';
                    }
                }
            } catch (_) {}
        }

        function esc(value) {
            return String(value || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function toMinutes(hhmm) {
            const [h,m] = String(hhmm || '').split(':').map(Number);
            return (Number.isFinite(h) && Number.isFinite(m)) ? (h*60)+m : 0;
        }

        function teamName(teamId) {
            const id = String(teamId || '');
            if (!id) return 'Sense equip';
            const t = teams.find(x => String(x.id) === id);
            return t ? t.name : `Equip ${id}`;
        }

        function normalizeHorari(row) {
            const rawCamp = String(row.camp || '').trim();
            const rawTipus = String(row.tipus || '').trim().toLowerCase();
            const inferredPorters = /^porteria\s*:/i.test(rawCamp);
            const decodedPorteria = inferredPorters
                ? rawCamp.replace(/^porteria\s*:/i, '').trim()
                : '';
            const tipus = (rawTipus === 'porters' || inferredPorters) ? 'porters' : 'equip';
            const porteria = String(row.porteria || decodedPorteria || '').trim();

            return {
                id: String(row.id || `${Date.now()}_${Math.random().toString(36).slice(2)}`),
                team_id: String(row.team_id || '').trim(),
                dia: String(row.dia || ''),
                inici: String(row.inici || ''),
                fi: String(row.fi || ''),
                camp: tipus === 'porters' ? '' : rawCamp,
                vestidor: String(row.vestidor || '').trim(),
                tipus,
                porteria: tipus === 'porters' ? porteria : ''
            };
        }

        function isPortersTraining(row) {
            return String(row && row.tipus || '').trim().toLowerCase() === 'porters';
        }

        function renderTabs() {
            const el = document.getElementById('dayTabs');
            el.innerHTML = DIES.map(day => (
                `<button class="day-tab ${day===activeDay?'active':''}" data-day="${esc(day)}">${esc(day)}</button>`
            )).join('');
            el.querySelectorAll('.day-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeDay = btn.dataset.day;
                    renderTabs();
                    renderBoard();
                });
            });
        }

        function renderBoard() {
            const board = document.getElementById('board');
            const dayBig = document.getElementById('dayBig');
            const daySub = document.getElementById('daySub');
            const dayRows = horarios
                .filter(h => h.dia === activeDay && h.inici && h.fi)
                .sort((a,b) => toMinutes(a.inici) - toMinutes(b.inici) || toMinutes(a.fi) - toMinutes(b.fi));
            const equipRows = dayRows.filter(h => !isPortersTraining(h));
            const portersRows = dayRows.filter(h => isPortersTraining(h));
            const normalizedPortersRows = (() => {
                const expanded = [];
                portersRows.forEach(item => {
                    const inici = String(item.inici || '').trim();
                    const fi = String(item.fi || '').trim();

                    if (inici === '18:45' && fi === '20:30') {
                        expanded.push({ ...item, inici: '18:00', fi: '18:45' });
                        expanded.push({ ...item, inici: '18:45', fi: '19:30' });
                        return;
                    }

                    expanded.push({ ...item, inici, fi });
                });

                const seen = new Set();
                return expanded.filter(item => {
                    const key = `${String(item.porteria || '').trim()}|${String(item.inici || '').trim()}|${String(item.fi || '').trim()}`;
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                });
            })();

            dayBig.textContent = activeDay;

            if (equipRows.length === 0) {
                daySub.textContent = 'Sense franges registrades per aquest dia';
                board.innerHTML = `<div class="empty">No hi ha franges d'entrenament per ${esc(activeDay)}.</div>`;
                return;
            }

            const groupsMap = {};
            equipRows.forEach(item => {
                const key = `${item.inici}|${item.fi}`;
                if (!groupsMap[key]) groupsMap[key] = { inici: item.inici, fi: item.fi, items: [] };
                groupsMap[key].items.push(item);
            });

            const groups = Object.values(groupsMap).sort((a,b) => toMinutes(a.inici) - toMinutes(b.inici));
            daySub.textContent = `${groups.length} franges`;

            const vestidorNumber = (value) => {
                const raw = String(value || '').trim();
                const m = raw.match(/(\d+)/);
                return m ? m[1] : '';
            };

            const cellData = (items, campName) => {
                const match = items.find(x => String(x.camp || '') === campName);
                if (!match) return { team: '', locker: '' };
                return {
                    team: teamName(match.team_id),
                    locker: vestidorNumber(match.vestidor)
                };
            };

            const isOverlap = (startA, endA, startB, endB) => startA < endB && endA > startB;

            const getPortersRowsForGroup = (group) => {
                const groupStart = toMinutes(group.inici);
                const groupEnd = toMinutes(group.fi);
                return normalizedPortersRows.filter(item => {
                    const itemStart = toMinutes(item.inici);
                    const itemEnd = toMinutes(item.fi);
                    return isOverlap(groupStart, groupEnd, itemStart, itemEnd);
                });
            };

            const getPortersLabelsForPorteria = (items, porteriaName) => {
                const target = String(porteriaName || '').trim();
                if (!target) return [];
                const labels = items
                    .filter(item => String(item.porteria || '').trim() === target)
                    .map(item => {
                        const inici = String(item.inici || '').trim();
                        const fi = String(item.fi || '').trim();
                        if (!inici || !fi) return '';
                        return `${inici} - ${fi}`;
                    })
                    .filter(Boolean);
                return [...new Set(labels)];
            };

            const cellMarkup = (cell, portersLabels, hideEmptyTeam = false) => {
                const hasTeam = Boolean(cell.team);
                const teamText = hasTeam ? cell.team : (hideEmptyTeam ? '' : '—');
                const markers = (Array.isArray(portersLabels) ? portersLabels : [])
                    .map(label => `<div class="goalkeeper-marker"><span class="goalkeeper-title">PORTERS</span><span class="goalkeeper-time">${esc(label)}</span></div>`)
                    .join('');
                const teamMarkup = teamText
                    ? `<div class="team-line"><div class="team-pill ${hasTeam ? '' : 'empty'}">${esc(teamText)}</div></div>`
                    : '';
                return `<div>${teamMarkup}${markers}</div>`;
            };

            const renderPitchLines = () => `
                <svg class="field-lines" viewBox="0 0 105 68" preserveAspectRatio="none" aria-hidden="true" focusable="false">
                    <rect class="line" x="0.5" y="0.5" width="104" height="67"></rect>
                    <line class="line" x1="52.5" y1="0.5" x2="52.5" y2="67.5"></line>
                    <circle class="line" cx="52.5" cy="34" r="9.15"></circle>
                    <circle class="spot" cx="52.5" cy="34" r="0.6"></circle>

                    <rect class="line" x="0.5" y="13.84" width="16.5" height="40.32"></rect>
                    <rect class="line" x="0.5" y="24.84" width="5.5" height="18.32"></rect>
                    <circle class="spot" cx="11" cy="34" r="0.6"></circle>
                    <path class="line" d="M 17 27.09 A 9.15 9.15 0 0 1 17 40.91"></path>

                    <rect class="line" x="88" y="13.84" width="16.5" height="40.32"></rect>
                    <rect class="line" x="99" y="24.84" width="5.5" height="18.32"></rect>
                    <circle class="spot" cx="94" cy="34" r="0.6"></circle>
                    <path class="line" d="M 88 27.09 A 9.15 9.15 0 0 0 88 40.91"></path>

                    <path class="line" d="M 0.5 1.5 A 1 1 0 0 1 1.5 0.5"></path>
                    <path class="line" d="M 103.5 0.5 A 1 1 0 0 1 104.5 1.5"></path>
                    <path class="line" d="M 0.5 66.5 A 1 1 0 0 0 1.5 67.5"></path>
                    <path class="line" d="M 103.5 67.5 A 1 1 0 0 0 104.5 66.5"></path>
                </svg>
            `;

            const renderVestidors = (items) => {
                const entries = [];
                const seen = new Set();
                items.forEach(item => {
                    const team = teamName(item.team_id);
                    const locker = vestidorNumber(item.vestidor);
                    if (!locker) return;
                    const key = `${team}__${locker}`;
                    if (seen.has(key)) return;
                    seen.add(key);
                    entries.push({ team, locker });
                });

                if (!entries.length) {
                    return `<aside class="vestidors-box"><h4>Vestidors</h4><div class="vestidors-empty">Sense assignació</div></aside>`;
                }

                return `
                    <aside class="vestidors-box">
                        <h4>Vestidors</h4>
                        <ul class="vestidors-list">
                            ${entries.map(e => `<li>- ${esc(e.team)} - ${esc(e.locker)}</li>`).join('')}
                        </ul>
                    </aside>
                `;
            };

            const renderQuadField = (equipItems, portersItems) => {
                const z1 = cellData(equipItems, 'Espai 1');
                const z2 = cellData(equipItems, 'Espai 2');
                const z3 = cellData(equipItems, 'Espai 3');
                const z4 = cellData(equipItems, 'Espai 4');
                const p1 = getPortersLabelsForPorteria(portersItems, 'Espai 1');
                const p2 = getPortersLabelsForPorteria(portersItems, 'Espai 2');
                const p3 = getPortersLabelsForPorteria(portersItems, 'Espai 3');
                const p4 = getPortersLabelsForPorteria(portersItems, 'Espai 4');
                const f11LeftTeamLabels = [...new Set(
                    equipItems
                        .filter(item => String(item.camp || '').trim() === 'Espai 1/2 (F11)')
                        .map(item => teamName(item.team_id))
                        .filter(Boolean)
                )];
                const f11RightTeamLabels = [...new Set(
                    equipItems
                        .filter(item => String(item.camp || '').trim() === 'Espai 3/4 (F11)')
                        .map(item => teamName(item.team_id))
                        .filter(Boolean)
                )];
                const f11LeftPorters = getPortersLabelsForPorteria(portersItems, 'Espai 1/2 (F11)');
                const f11RightPorters = getPortersLabelsForPorteria(portersItems, 'Espai 3/4 (F11)');
                const f11HalfCenterMarkup = `${f11LeftTeamLabels.length ? `<div class="half-center-stack left">${f11LeftTeamLabels.map(label => `<div class="team-pill">${esc(label)}</div>`).join('')}</div>` : ''}${f11RightTeamLabels.length ? `<div class="half-center-stack right">${f11RightTeamLabels.map(label => `<div class="team-pill">${esc(label)}</div>`).join('')}</div>` : ''}`;
                const f11GoalAreaMarkup = `${f11LeftPorters.length ? `<div class="goal-area-stack left">${f11LeftPorters.map(label => `<div class="goalkeeper-marker"><span class="goalkeeper-title">PORTERS</span><span class="goalkeeper-time">${esc(label)}</span></div>`).join('')}</div>` : ''}${f11RightPorters.length ? `<div class="goal-area-stack right">${f11RightPorters.map(label => `<div class="goalkeeper-marker"><span class="goalkeeper-title">PORTERS</span><span class="goalkeeper-time">${esc(label)}</span></div>`).join('')}</div>` : ''}`;
                const hideEmptyF7Slots = (f11LeftTeamLabels.length || f11RightTeamLabels.length || f11LeftPorters.length || f11RightPorters.length);
                return `
                    <div class="field-card">
                        <div class="field quad">
                            ${renderPitchLines()}
                            ${f11HalfCenterMarkup}
                            ${f11GoalAreaMarkup}
                            <div class="zones quad">
                                <div class="zone">${cellMarkup(z1, p1, hideEmptyF7Slots)}</div>
                                <div class="zone">${cellMarkup(z2, p2, hideEmptyF7Slots)}</div>
                                <div class="zone">${cellMarkup(z3, p3, hideEmptyF7Slots)}</div>
                                <div class="zone">${cellMarkup(z4, p4, hideEmptyF7Slots)}</div>
                            </div>
                        </div>
                    </div>
                `;
            };

            const html = groups.map(group => {
                const equipItems = group.items;
                const portersItems = getPortersRowsForGroup(group);
                const hasStdEquip = equipItems.some(x => CAMP_STD.includes(String(x.camp || '')));
                const hasF11Equip = equipItems.some(x => CAMP_F11.includes(String(x.camp || '')));
                const hasStdPorters = portersItems.some(x => CAMP_STD.includes(String(x.porteria || '')));
                const hasF11Porters = portersItems.some(x => CAMP_F11.includes(String(x.porteria || '')));
                const hasAnyField = hasStdEquip || hasF11Equip || hasStdPorters || hasF11Porters;
                const pending = equipItems.filter(x => !String(x.camp || '').trim()).map(x => teamName(x.team_id));
                const portersCount = portersItems.length;
                const tagParts = [`${equipItems.length} assignacions`];
                if (portersCount) {
                    tagParts.push(`${portersCount} sessions porters`);
                }

                return `
                    <article class="slot">
                        <div class="slot-head">
                            <div class="slot-time">${esc(group.inici)} - ${esc(group.fi)}</div>
                            <div class="slot-tag">${tagParts.join(' · ')}</div>
                        </div>
                        <div class="slot-layout">
                            <div class="fields">
                                ${hasAnyField ? renderQuadField(equipItems, portersItems) : ''}
                            </div>
                            ${renderVestidors(equipItems)}
                        </div>
                        ${pending.length ? `<div class="pending-list" style="margin-top:0.65rem;">${pending.map(p => `<span class="pending-item">${esc(p)} · sense camp</span>`).join('')}</div>` : ''}
                    </article>
                `;
            }).join('');

            board.innerHTML = html;
        }

        async function loadData() {
            const refreshBtn = document.getElementById('refreshBtn');
            const refreshStatus = document.getElementById('refreshStatus');
            if (refreshBtn) refreshBtn.disabled = true;
            if (refreshStatus) {
                refreshStatus.className = 'refresh-status';
                refreshStatus.textContent = 'Carregant...';
            }

            try {
                const [teamsRes, horariosRes] = await Promise.all([
                    fetch(API_EQUIPS),
                    fetch(API_HORARIOS)
                ]);

                teams = teamsRes.ok ? await teamsRes.json() : [];
                horarios = horariosRes.ok ? await horariosRes.json() : [];

                if (!Array.isArray(teams)) teams = [];
                if (!Array.isArray(horarios)) horarios = [];

                teams = teams.map(t => ({ id: String(t.id || ''), name: String(t.name || `Equip ${t.id || ''}`) }));
                horarios = horarios.map(normalizeHorari);

                renderTabs();
                renderBoard();

                if (refreshStatus) {
                    refreshStatus.className = 'refresh-status ok';
                    refreshStatus.textContent = 'Actualitzat';
                }
            } catch (err) {
                document.getElementById('board').innerHTML = `<div class="empty">Error carregant dades d'horaris.</div>`;
                console.error(err);
                if (refreshStatus) {
                    refreshStatus.className = 'refresh-status err';
                    refreshStatus.textContent = 'Error';
                }
            } finally {
                if (refreshBtn) refreshBtn.disabled = false;
            }
        }

        const refreshBtn = document.getElementById('refreshBtn');
        if (refreshBtn) {
            refreshBtn.addEventListener('click', loadData);
        }

        (async function initPage() {
            await applyActionsVisibilityByRole();
            loadData();
        })();
    </script>
</body>
</html>
